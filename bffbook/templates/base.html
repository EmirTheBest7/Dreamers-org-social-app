<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    document.getElementsByTagName("html")[0].className += " js";
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.14/semantic.min.css">
  <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/default.css' %}">
  <link rel="stylesheet" href="{% static 'css/bootstrap-5.0.0-alpha-1.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/profile-card.css' %}">
  <link rel="stylesheet" href="{% static 'css/landing.css' %}">
  <link rel="stylesheet" href="{% static 'css/customupload.css' %}">
  <link rel="stylesheet" href="{% static 'css/post-card.css' %}">
  <link rel="stylesheet" href="{% static 'css/loader.css' %}">
  <link rel="stylesheet" href="{% static 'css/profile-page.css' %}">
  <!--<link rel="stylesheet" href="{% static 'css/post-buttons.css' %}">-->
  <link rel="stylesheet" href="{% static 'css/menu.css' %}">
  <link rel="stylesheet" href="{% static 'css/search.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
  <link rel="stylesheet" type="text/css"
    href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.js"></script>
  <title>Dreamers - {% block title %}{% endblock title %}</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'iconified/favicon.ico' %}" type="image/x-icon" />
  <link rel="apple-touch-icon" href="{% static 'iconified/apple-touch-icon.png' %}" />
  <link rel="apple-touch-icon" sizes="57x57" href="{% static 'iconified/apple-touch-icon-57x57.png' %}" />
  <link rel="apple-touch-icon" sizes="72x72" href="{% static 'iconified/apple-touch-icon-72x72.png' %}" />
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'iconified/apple-touch-icon-76x76.png' %}" />
  <link rel="apple-touch-icon" sizes="114x114" href="{% static 'iconified/apple-touch-icon-114x114.png' %}" />
  <link rel="apple-touch-icon" sizes="120x120" href="{% static 'iconified/apple-touch-icon-120x120.png' %}" />
  <link rel="apple-touch-icon" sizes="144x144" href="{% static 'iconified/apple-touch-icon-144x144.png' %}" />
  <link rel="apple-touch-icon" sizes="152x152" href="{% static 'iconified/apple-touch-icon-152x152.png' %}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'iconified/apple-touch-icon-180x180.png' %}" />


</head>

<body style="background:#f2f2f2!important;">
  <!-- Preloader -->
  <div class="loading-screen">
    <div class="loading-animation">
      <img src="{% static 'iconified/DreamersApp.svg' %}" alt="" class="logo">
      <div class="loading-bar"></div>
    </div>
  </div>
  <!-- /Preloader -->

  <header class="cd-header container-fluid" style="padding:0;">
    {% include 'main/navbar.html' %}
    <div class="container mt-3">
      <!-- ui container -->
      {% block content %}
      {% endblock content %}
    </div>

    {% block scripts %}
    {% endblock scripts %}
  </header>

  <nav class="cd-3d-nav js-cd-3d-nav" id="cd-3d-nav">

    <ul class="cd-3d-nav__list">
      <li onclick="location.href='{% url 'posts:main-post-view' %}'" class="cd-3d-nav__item cd-3d-nav__item--selected">
        <a href="">
          <img class="icon icon--md" src="{% static './SVG/Board.svg' %}">
          <span>Board</span>
        </a>
      </li>

      <li onclick="location.href='{% url 'profiles:all-profiles-view' %}'" class="cd-3d-nav__item">
        <a href="#0">
          <img class="icon icon--md" src="{% static './SVG/Discover.svg' %}">
          <span>Connect</span>
        </a>
      </li>

      <li class="cd-3d-nav__item">
        <a href="#0">
          <img class="icon icon--md" src="{% static './SVG/Messenger.svg' %}">
          <span>Messenger</span>
        </a>
      </li>

      <li onclick="location.href='{% url 'profiles:my-profile-view' %}'" class="cd-3d-nav__item">
        <a href="#0">
          <img class="icon icon--md" src="{% static './SVG/Profile.svg' %}">
          <span>Profile</span>
        </a>
      </li>

      <li onclick="location.href='{% url 'logout' %}'" class="cd-3d-nav__item">
        <a href="">
          <img class="icon icon--md" src="{% static './SVG/Logout.svg' %}">
          <span>Logout</span>
        </a>
      </li>
    </ul>

    <span class="cd-3d-nav__marker cd-3d-nav__marker--col-1" aria-hidden="true"></span>
  </nav>



  <!-- Script /Menu -->


  <script src="{% static 'js/util.js' %}"></script>
  <script src="{% static 'js/menu.js' %}"></script>
  <script src="{% static 'js/profile.js' %}"></script>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="{% static 'js/bootstrap.bundle-5.0.0.alpha-1-min.js' %}"></script>
  

  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/script.js' %}"></script>

  <!-- Landing Page -->
  <script src="{% static 'js/functions-min.js' %}"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.10/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
  <script src="{% static 'js/search.js' %}"></script>

  <script>
      // Loader 
      $(window).on('load',function(){
          $(".loading-screen").fadeOut(1000);
          $(".cd-header").fadeIn(1000);
      });
  </script>

</body>

</html>
